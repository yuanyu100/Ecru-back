<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .actor { fill: #fff; stroke: #222; stroke-width: 2; rx: 10; ry: 10; }
      .name { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .msg { font: 15px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #222; }
      .line { stroke: #222; stroke-width: 2; fill: none; }
      .life { stroke: #999; stroke-width: 1.4; stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
  <text x="720" y="40" text-anchor="middle" class="title">图5-4 首页推荐生成时序图</text>

  <g transform="translate(50,90)"><rect width="150" height="50" class="actor"/><text x="75" y="31" text-anchor="middle" class="name">用户</text></g>
  <g transform="translate(260,90)"><rect width="170" height="50" class="actor"/><text x="85" y="31" text-anchor="middle" class="name">首页前端</text></g>
  <g transform="translate(490,90)"><rect width="210" height="50" class="actor"/><text x="105" y="31" text-anchor="middle" class="name">OutfitAdviceController</text></g>
  <g transform="translate(770,90)"><rect width="240" height="50" class="actor"/><text x="120" y="31" text-anchor="middle" class="name">HomeRecommendationService</text></g>
  <g transform="translate(1080,90)"><rect width="150" height="50" class="actor"/><text x="75" y="31" text-anchor="middle" class="name">MySQL</text></g>
  <g transform="translate(1280,90)"><rect width="120" height="50" class="actor"/><text x="60" y="31" text-anchor="middle" class="name">天气服务</text></g>

  <line x1="125" y1="140" x2="125" y2="710" class="life"/>
  <line x1="345" y1="140" x2="345" y2="710" class="life"/>
  <line x1="595" y1="140" x2="595" y2="710" class="life"/>
  <line x1="890" y1="140" x2="890" y2="710" class="life"/>
  <line x1="1155" y1="140" x2="1155" y2="710" class="life"/>
  <line x1="1340" y1="140" x2="1340" y2="710" class="life"/>

  <line x1="125" y1="180" x2="345" y2="180" class="line" marker-end="url(#arrow)"/>
  <text x="205" y="170" class="msg">1. 打开首页或手动刷新</text>

  <line x1="345" y1="225" x2="595" y2="225" class="line" marker-end="url(#arrow)"/>
  <text x="430" y="215" class="msg">2. GET /outfit/home-recommendations</text>

  <line x1="595" y1="270" x2="890" y2="270" class="line" marker-end="url(#arrow)"/>
  <text x="690" y="260" class="msg">3. 调用推荐服务</text>

  <line x1="890" y1="320" x2="1155" y2="320" class="line" marker-end="url(#arrow)"/>
  <text x="960" y="310" class="msg">4. 查询旧推荐和用户衣柜</text>

  <line x1="890" y1="380" x2="1340" y2="380" class="line" marker-end="url(#arrow)"/>
  <text x="1070" y="370" class="msg">5. 获取温度、天气和场景上下文</text>

  <line x1="1340" y1="420" x2="890" y2="420" class="line" marker-end="url(#arrow)"/>
  <text x="1080" y="410" class="msg">6. 返回天气结果</text>

  <line x1="890" y1="480" x2="1155" y2="480" class="line" marker-end="url(#arrow)"/>
  <text x="960" y="470" class="msg">7. 保存推荐记录和关联单品</text>

  <line x1="890" y1="550" x2="595" y2="550" class="line" marker-end="url(#arrow)"/>
  <text x="700" y="540" class="msg">8. 返回推荐结果</text>

  <line x1="595" y1="610" x2="345" y2="610" class="line" marker-end="url(#arrow)"/>
  <text x="430" y="600" class="msg">9. 返回 JSON 数据</text>

  <line x1="345" y1="670" x2="125" y2="670" class="line" marker-end="url(#arrow)"/>
  <text x="200" y="660" class="msg">10. 渲染推荐卡片和详情入口</text>
</svg>
