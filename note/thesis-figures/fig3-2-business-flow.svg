<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="980" viewBox="0 0 1380 980">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .lane { fill: #fff; stroke: #999; stroke-width: 1.4; }
      .laneTitle { font: 700 20px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .step { fill: #fff; stroke: #222; stroke-width: 1.8; rx: 9; ry: 9; }
      .decision { fill: #fff; stroke: #222; stroke-width: 1.8; }
      .text { font: 17px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .small { font: 15px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .line { stroke: #222; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <text x="690" y="48" text-anchor="middle" class="title">图3-2 用户智能穿搭业务流程图</text>

  <rect x="40" y="92" width="240" height="800" class="lane"/>
  <rect x="280" y="92" width="240" height="800" class="lane"/>
  <rect x="520" y="92" width="240" height="800" class="lane"/>
  <rect x="760" y="92" width="260" height="800" class="lane"/>
  <rect x="1020" y="92" width="320" height="800" class="lane"/>

  <text x="160" y="128" text-anchor="middle" class="laneTitle">用户</text>
  <text x="400" y="128" text-anchor="middle" class="laneTitle">前端</text>
  <text x="640" y="128" text-anchor="middle" class="laneTitle">业务服务</text>
  <text x="890" y="128" text-anchor="middle" class="laneTitle">AI / 推荐能力</text>
  <text x="1180" y="128" text-anchor="middle" class="laneTitle">数据存储</text>

  <rect x="100" y="178" width="120" height="50" class="step"/>
  <text x="160" y="210" text-anchor="middle" class="text">登录系统</text>
  <rect x="340" y="178" width="120" height="50" class="step"/>
  <text x="400" y="210" text-anchor="middle" class="text">提交认证请求</text>
  <rect x="580" y="178" width="120" height="50" class="step"/>
  <text x="640" y="210" text-anchor="middle" class="text">校验身份并签发令牌</text>
  <rect x="1110" y="178" width="140" height="50" class="step"/>
  <text x="1180" y="210" text-anchor="middle" class="text">读取用户资料</text>

  <rect x="100" y="304" width="120" height="50" class="step"/>
  <text x="160" y="336" text-anchor="middle" class="text">上传衣物图片</text>
  <rect x="340" y="304" width="120" height="50" class="step"/>
  <text x="400" y="336" text-anchor="middle" class="text">提交建档表单</text>
  <rect x="580" y="304" width="120" height="50" class="step"/>
  <text x="640" y="336" text-anchor="middle" class="text">保存衣物记录</text>
  <rect x="820" y="250" width="140" height="50" class="step"/>
  <text x="890" y="282" text-anchor="middle" class="text">调用图像识别服务</text>
  <rect x="1110" y="304" width="140" height="50" class="step"/>
  <text x="1180" y="336" text-anchor="middle" class="text">写入衣物与标签</text>

  <rect x="100" y="430" width="120" height="50" class="step"/>
  <text x="160" y="462" text-anchor="middle" class="text">风格反馈</text>
  <rect x="340" y="430" width="120" height="50" class="step"/>
  <text x="400" y="462" text-anchor="middle" class="text">提交喜欢/不喜欢</text>
  <rect x="580" y="430" width="120" height="50" class="step"/>
  <text x="640" y="462" text-anchor="middle" class="text">更新偏好画像</text>
  <rect x="1110" y="430" width="140" height="50" class="step"/>
  <text x="1180" y="462" text-anchor="middle" class="text">记录偏好日志</text>

  <rect x="100" y="556" width="120" height="50" class="step"/>
  <text x="160" y="588" text-anchor="middle" class="text">请求穿搭推荐</text>
  <rect x="340" y="556" width="120" height="50" class="step"/>
  <text x="400" y="588" text-anchor="middle" class="text">传入天气与场景</text>
  <rect x="580" y="556" width="120" height="50" class="step"/>
  <text x="640" y="588" text-anchor="middle" class="text">组织推荐上下文</text>
  <rect x="820" y="556" width="140" height="50" class="step"/>
  <text x="890" y="588" text-anchor="middle" class="text">生成首页推荐方案</text>
  <rect x="1110" y="556" width="140" height="50" class="step"/>
  <text x="1180" y="588" text-anchor="middle" class="text">读取衣柜与历史</text>

  <rect x="100" y="682" width="120" height="50" class="step"/>
  <text x="160" y="714" text-anchor="middle" class="text">输入提问</text>
  <rect x="340" y="682" width="120" height="50" class="step"/>
  <text x="400" y="714" text-anchor="middle" class="text">发起 AI 对话</text>
  <rect x="580" y="682" width="120" height="50" class="step"/>
  <text x="640" y="714" text-anchor="middle" class="text">组装会话上下文</text>

  <polygon points="890,660 960,716 890,772 820,716" class="decision"/>
  <text x="890" y="706" text-anchor="middle" class="text">是否需要</text>
  <text x="890" y="730" text-anchor="middle" class="text">进一步问答</text>

  <rect x="820" y="812" width="140" height="50" class="step"/>
  <text x="890" y="844" text-anchor="middle" class="text">检索知识并生成回复</text>
  <rect x="1110" y="812" width="160" height="50" class="step"/>
  <text x="1190" y="844" text-anchor="middle" class="text">读取知识与向量数据</text>

  <line x1="220" y1="203" x2="340" y2="203" class="line"/>
  <line x1="460" y1="203" x2="580" y2="203" class="line"/>
  <line x1="700" y1="203" x2="1110" y2="203" class="line"/>

  <line x1="220" y1="329" x2="340" y2="329" class="line"/>
  <line x1="460" y1="329" x2="580" y2="329" class="line"/>
  <line x1="700" y1="329" x2="790" y2="329" class="line"/>
  <line x1="790" y1="329" x2="790" y2="275" class="line"/>
  <line x1="790" y1="275" x2="820" y2="275" class="line"/>
  <line x1="700" y1="339" x2="1110" y2="339" class="line"/>

  <line x1="220" y1="455" x2="340" y2="455" class="line"/>
  <line x1="460" y1="455" x2="580" y2="455" class="line"/>
  <line x1="700" y1="455" x2="1110" y2="455" class="line"/>

  <line x1="220" y1="581" x2="340" y2="581" class="line"/>
  <line x1="460" y1="581" x2="580" y2="581" class="line"/>
  <line x1="700" y1="581" x2="820" y2="581" class="line"/>
  <line x1="960" y1="581" x2="1110" y2="581" class="line"/>
  <line x1="890" y1="606" x2="890" y2="660" class="line"/>

  <line x1="820" y1="716" x2="700" y2="716" class="line"/>
  <line x1="580" y1="707" x2="460" y2="707" class="line"/>
  <line x1="340" y1="707" x2="220" y2="707" class="line"/>
  <text x="780" y="704" text-anchor="middle" class="small">是</text>

  <line x1="960" y1="716" x2="1040" y2="716" class="line"/>
  <text x="1000" y="704" text-anchor="middle" class="small">否</text>

  <line x1="700" y1="707" x2="820" y2="707" class="line"/>
  <line x1="700" y1="721" x2="770" y2="721" class="line"/>
  <line x1="770" y1="721" x2="770" y2="837" class="line"/>
  <line x1="770" y1="837" x2="820" y2="837" class="line"/>
  <line x1="960" y1="837" x2="1110" y2="837" class="line"/>

  <line x1="1040" y1="716" x2="1120" y2="716" class="line"/>
  <line x1="1120" y1="716" x2="1120" y2="606" class="line"/>
  <line x1="1120" y1="606" x2="960" y2="606" class="line"/>
  <text x="1075" y="698" text-anchor="middle" class="small">结束推荐流程</text>
</svg>
