<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .actor { fill: #fff; stroke: #222; stroke-width: 2; rx: 10; ry: 10; }
      .name { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .msg { font: 15px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #222; }
      .line { stroke: #222; stroke-width: 2; fill: none; }
      .life { stroke: #999; stroke-width: 1.4; stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
  <text x="700" y="40" text-anchor="middle" class="title">图5-1 用户登录与令牌续期时序图</text>

  <g transform="translate(40,90)"><rect width="150" height="50" class="actor"/><text x="75" y="31" text-anchor="middle" class="name">用户</text></g>
  <g transform="translate(250,90)"><rect width="180" height="50" class="actor"/><text x="90" y="31" text-anchor="middle" class="name">用户端前端</text></g>
  <g transform="translate(500,90)"><rect width="190" height="50" class="actor"/><text x="95" y="31" text-anchor="middle" class="name">AuthController</text></g>
  <g transform="translate(760,90)"><rect width="190" height="50" class="actor"/><text x="95" y="31" text-anchor="middle" class="name">UserServiceImpl</text></g>
  <g transform="translate(1010,90)"><rect width="150" height="50" class="actor"/><text x="75" y="31" text-anchor="middle" class="name">JwtUtil</text></g>
  <g transform="translate(1210,90)"><rect width="150" height="50" class="actor"/><text x="75" y="31" text-anchor="middle" class="name">MySQL</text></g>

  <line x1="115" y1="140" x2="115" y2="710" class="life"/>
  <line x1="340" y1="140" x2="340" y2="710" class="life"/>
  <line x1="595" y1="140" x2="595" y2="710" class="life"/>
  <line x1="855" y1="140" x2="855" y2="710" class="life"/>
  <line x1="1085" y1="140" x2="1085" y2="710" class="life"/>
  <line x1="1285" y1="140" x2="1285" y2="710" class="life"/>

  <line x1="115" y1="180" x2="340" y2="180" class="line" marker-end="url(#arrow)"/>
  <text x="205" y="170" class="msg">1. 输入用户名和密码</text>

  <line x1="340" y1="230" x2="595" y2="230" class="line" marker-end="url(#arrow)"/>
  <text x="430" y="220" class="msg">2. POST /auth/login</text>

  <line x1="595" y1="280" x2="855" y2="280" class="line" marker-end="url(#arrow)"/>
  <text x="690" y="270" class="msg">3. 调用登录业务</text>

  <line x1="855" y1="330" x2="1285" y2="330" class="line" marker-end="url(#arrow)"/>
  <text x="1020" y="320" class="msg">4. 查询用户并校验 BCrypt 密码</text>

  <line x1="1285" y1="370" x2="855" y2="370" class="line" marker-end="url(#arrow)"/>
  <text x="1040" y="360" class="msg">5. 返回用户实体</text>

  <line x1="855" y1="420" x2="1085" y2="420" class="line" marker-end="url(#arrow)"/>
  <text x="940" y="410" class="msg">6. 生成 accessToken / refreshToken</text>

  <line x1="1085" y1="470" x2="595" y2="470" class="line" marker-end="url(#arrow)"/>
  <text x="820" y="460" class="msg">7. 返回登录结果</text>

  <line x1="595" y1="520" x2="340" y2="520" class="line" marker-end="url(#arrow)"/>
  <text x="430" y="510" class="msg">8. 返回 JSON 令牌</text>

  <line x1="340" y1="570" x2="115" y2="570" class="line" marker-end="url(#arrow)"/>
  <text x="190" y="560" class="msg">9. 建立登录态</text>

  <line x1="340" y1="640" x2="595" y2="640" class="line" marker-end="url(#arrow)"/>
  <text x="420" y="630" class="msg">10. POST /auth/refresh</text>

  <line x1="595" y1="680" x2="1085" y2="680" class="line" marker-end="url(#arrow)"/>
  <text x="780" y="670" class="msg">11. 校验旧 refreshToken，加入黑名单并换发新令牌</text>
</svg>
