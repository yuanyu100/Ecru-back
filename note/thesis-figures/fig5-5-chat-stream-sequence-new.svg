<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="820" viewBox="0 0 1520 820">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .actor { fill: #fff; stroke: #222; stroke-width: 2; rx: 10; ry: 10; }
      .name { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .msg { font: 15px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #222; }
      .line { stroke: #222; stroke-width: 2; fill: none; }
      .life { stroke: #999; stroke-width: 1.4; stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
  <text x="760" y="40" text-anchor="middle" class="title">图5-5 AI聊天流式问答时序图</text>

  <g transform="translate(30,90)"><rect width="140" height="50" class="actor"/><text x="70" y="31" text-anchor="middle" class="name">用户</text></g>
  <g transform="translate(220,90)"><rect width="180" height="50" class="actor"/><text x="90" y="31" text-anchor="middle" class="name">聊天前端</text></g>
  <g transform="translate(470,90)"><rect width="220" height="50" class="actor"/><text x="110" y="31" text-anchor="middle" class="name">AiChatStreamController</text></g>
  <g transform="translate(760,90)"><rect width="210" height="50" class="actor"/><text x="105" y="31" text-anchor="middle" class="name">AiChatStreamService</text></g>
  <g transform="translate(1040,90)"><rect width="170" height="50" class="actor"/><text x="85" y="31" text-anchor="middle" class="name">向量/知识服务</text></g>
  <g transform="translate(1270,90)"><rect width="170" height="50" class="actor"/><text x="85" y="31" text-anchor="middle" class="name">AI生成服务</text></g>

  <line x1="100" y1="140" x2="100" y2="760" class="life"/>
  <line x1="310" y1="140" x2="310" y2="760" class="life"/>
  <line x1="580" y1="140" x2="580" y2="760" class="life"/>
  <line x1="865" y1="140" x2="865" y2="760" class="life"/>
  <line x1="1125" y1="140" x2="1125" y2="760" class="life"/>
  <line x1="1355" y1="140" x2="1355" y2="760" class="life"/>

  <line x1="100" y1="180" x2="310" y2="180" class="line" marker-end="url(#arrow)"/>
  <text x="180" y="170" class="msg">1. 输入问题</text>

  <line x1="310" y1="225" x2="580" y2="225" class="line" marker-end="url(#arrow)"/>
  <text x="405" y="215" class="msg">2. POST /ai-chat-stream/chat</text>

  <line x1="580" y1="270" x2="865" y2="270" class="line" marker-end="url(#arrow)"/>
  <text x="670" y="260" class="msg">3. 创建/读取会话并保存用户消息</text>

  <line x1="865" y1="320" x2="1125" y2="320" class="line" marker-end="url(#arrow)"/>
  <text x="950" y="310" class="msg">4. 触发衣柜检索或知识检索</text>

  <line x1="1125" y1="360" x2="865" y2="360" class="line" marker-end="url(#arrow)"/>
  <text x="935" y="350" class="msg">5. 返回候选衣物和知识结果</text>

  <line x1="865" y1="420" x2="1355" y2="420" class="line" marker-end="url(#arrow)"/>
  <text x="1045" y="410" class="msg">6. 发送天气、历史消息、候选衣物和提示词</text>

  <line x1="1355" y1="470" x2="580" y2="470" class="line" marker-end="url(#arrow)"/>
  <text x="970" y="460" class="msg">7. 按流式分片返回文本</text>

  <line x1="580" y1="520" x2="310" y2="520" class="line" marker-end="url(#arrow)"/>
  <text x="400" y="510" class="msg">8. SSE 转发到前端</text>

  <line x1="310" y1="565" x2="100" y2="565" class="line" marker-end="url(#arrow)"/>
  <text x="175" y="555" class="msg">9. 逐步渲染回答</text>

  <line x1="865" y1="640" x2="1125" y2="640" class="line" marker-end="url(#arrow)"/>
  <text x="940" y="630" class="msg">10. 保存上下文快照和推荐结果</text>

  <line x1="865" y1="700" x2="580" y2="700" class="line" marker-end="url(#arrow)"/>
  <text x="680" y="690" class="msg">11. 更新会话标题与消息数</text>
</svg>
