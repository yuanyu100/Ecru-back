<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="520" viewBox="0 0 1260 520">
  <defs>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .state { fill: #fff; stroke: #222; stroke-width: 2.2; rx: 14; ry: 14; }
      .active { fill: #f5f5f5; stroke: #111; stroke-width: 2.6; rx: 14; ry: 14; }
      .text { font: 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .small { font: 15px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .line { stroke: #222; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>

  <text x="630" y="46" text-anchor="middle" class="title">图3-3 推荐与对话状态流转图</text>

  <rect x="60" y="188" width="160" height="90" class="active"/>
  <text x="140" y="228" text-anchor="middle" class="text">初始待推荐</text>
  <text x="140" y="252" text-anchor="middle" class="small">登录后进入首页</text>

  <rect x="290" y="188" width="170" height="90" class="state"/>
  <text x="375" y="228" text-anchor="middle" class="text">上下文收集</text>
  <text x="375" y="252" text-anchor="middle" class="small">天气、场景、偏好、衣柜</text>

  <rect x="530" y="188" width="170" height="90" class="state"/>
  <text x="615" y="228" text-anchor="middle" class="text">方案生成</text>
  <text x="615" y="252" text-anchor="middle" class="small">构造推荐结果与解释</text>

  <rect x="770" y="188" width="170" height="90" class="state"/>
  <text x="855" y="228" text-anchor="middle" class="text">结果展示</text>
  <text x="855" y="252" text-anchor="middle" class="small">首页卡片、详情建议</text>

  <rect x="1010" y="188" width="170" height="90" class="state"/>
  <text x="1095" y="228" text-anchor="middle" class="text">反馈沉淀</text>
  <text x="1095" y="252" text-anchor="middle" class="small">穿着记录与评分</text>

  <rect x="770" y="360" width="170" height="90" class="state"/>
  <text x="855" y="400" text-anchor="middle" class="text">问答扩展</text>
  <text x="855" y="424" text-anchor="middle" class="small">进入 AI 对话与知识检索</text>

  <line x1="220" y1="233" x2="290" y2="233" class="line" marker-end="url(#arrow)"/>
  <line x1="460" y1="233" x2="530" y2="233" class="line" marker-end="url(#arrow)"/>
  <line x1="700" y1="233" x2="770" y2="233" class="line" marker-end="url(#arrow)"/>
  <line x1="940" y1="233" x2="1010" y2="233" class="line" marker-end="url(#arrow)"/>

  <line x1="855" y1="278" x2="855" y2="360" class="line" marker-end="url(#arrow)"/>
  <text x="874" y="320" class="small">继续追问</text>

  <line x1="1095" y1="278" x2="1095" y2="120" class="line"/>
  <line x1="1095" y1="120" x2="375" y2="120" class="line"/>
  <line x1="375" y1="120" x2="375" y2="188" class="line" marker-end="url(#arrow)"/>
  <text x="738" y="108" text-anchor="middle" class="small">刷新推荐或偏好更新后重新进入上下文收集</text>
</svg>
