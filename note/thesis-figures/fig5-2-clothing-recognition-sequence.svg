<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="780" viewBox="0 0 1480 780">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .actor { fill: #fff; stroke: #222; stroke-width: 2; rx: 10; ry: 10; }
      .name { font: 700 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111; }
      .msg { font: 15px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #222; }
      .line { stroke: #222; stroke-width: 2; fill: none; }
      .life { stroke: #999; stroke-width: 1.4; stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
  <text x="740" y="40" text-anchor="middle" class="title">图5-2 衣物新增与AI识别时序图</text>

  <g transform="translate(30,90)"><rect width="140" height="50" class="actor"/><text x="70" y="31" text-anchor="middle" class="name">用户</text></g>
  <g transform="translate(220,90)"><rect width="180" height="50" class="actor"/><text x="90" y="31" text-anchor="middle" class="name">用户端前端</text></g>
  <g transform="translate(470,90)"><rect width="190" height="50" class="actor"/><text x="95" y="31" text-anchor="middle" class="name">ClothingController</text></g>
  <g transform="translate(720,90)"><rect width="190" height="50" class="actor"/><text x="95" y="31" text-anchor="middle" class="name">ClothingServiceImpl</text></g>
  <g transform="translate(970,90)"><rect width="150" height="50" class="actor"/><text x="75" y="31" text-anchor="middle" class="name">MinIO</text></g>
  <g transform="translate(1170,90)"><rect width="140" height="50" class="actor"/><text x="70" y="31" text-anchor="middle" class="name">MySQL</text></g>
  <g transform="translate(1330,90)"><rect width="120" height="50" class="actor"/><text x="60" y="31" text-anchor="middle" class="name">AI服务</text></g>

  <line x1="100" y1="140" x2="100" y2="730" class="life"/>
  <line x1="310" y1="140" x2="310" y2="730" class="life"/>
  <line x1="565" y1="140" x2="565" y2="730" class="life"/>
  <line x1="815" y1="140" x2="815" y2="730" class="life"/>
  <line x1="1045" y1="140" x2="1045" y2="730" class="life"/>
  <line x1="1240" y1="140" x2="1240" y2="730" class="life"/>
  <line x1="1390" y1="140" x2="1390" y2="730" class="life"/>

  <line x1="100" y1="180" x2="310" y2="180" class="line" marker-end="url(#arrow)"/>
  <text x="185" y="170" class="msg">1. 选择图片并填写基础信息</text>

  <line x1="310" y1="225" x2="565" y2="225" class="line" marker-end="url(#arrow)"/>
  <text x="395" y="215" class="msg">2. POST /clothings/upload</text>

  <line x1="565" y1="270" x2="815" y2="270" class="line" marker-end="url(#arrow)"/>
  <text x="650" y="260" class="msg">3. 调用新增衣物服务</text>

  <line x1="815" y1="320" x2="1045" y2="320" class="line" marker-end="url(#arrow)"/>
  <text x="885" y="310" class="msg">4. 上传图片</text>

  <line x1="1045" y1="360" x2="815" y2="360" class="line" marker-end="url(#arrow)"/>
  <text x="900" y="350" class="msg">5. 返回图片地址</text>

  <line x1="815" y1="410" x2="1240" y2="410" class="line" marker-end="url(#arrow)"/>
  <text x="980" y="400" class="msg">6. 写入 clothings 与相关记录</text>

  <line x1="1240" y1="450" x2="815" y2="450" class="line" marker-end="url(#arrow)"/>
  <text x="1020" y="440" class="msg">7. 返回衣物编号</text>

  <line x1="815" y1="500" x2="1390" y2="500" class="line" marker-end="url(#arrow)"/>
  <text x="1040" y="490" class="msg">8. 调用图像识别，回传类别/颜色/材质等结果</text>

  <line x1="1390" y1="545" x2="815" y2="545" class="line" marker-end="url(#arrow)"/>
  <text x="1035" y="535" class="msg">9. 返回识别结果</text>

  <line x1="815" y1="595" x2="1240" y2="595" class="line" marker-end="url(#arrow)"/>
  <text x="980" y="585" class="msg">10. 更新识别字段与向量数据</text>

  <line x1="815" y1="645" x2="565" y2="645" class="line" marker-end="url(#arrow)"/>
  <text x="690" y="635" class="msg">11. 返回新增结果</text>

  <line x1="565" y1="690" x2="310" y2="690" class="line" marker-end="url(#arrow)"/>
  <text x="395" y="680" class="msg">12. 返回 JSON</text>
</svg>
