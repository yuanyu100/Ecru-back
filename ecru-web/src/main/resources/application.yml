server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ecru-backend

  # MySQL 数据源（主数据源）
  datasource:
    url: jdbc:mysql://localhost:3306/ecru?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 040726fan
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  # PostgreSQL 数据源（向量存储）
  datasource-pg:
    url: jdbc:postgresql://localhost:5432/ecru-pg
    username: postgres
    password: 040726fan
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml,classpath*:/com/ecru/**/mapper/xml/*.xml

# JWT配置
jwt:
  secret: ecru-secret-key-2026-for-jwt-token-generation
  access-token-expire: 7200
  refresh-token-expire: 604800

# 日志配置
logging:
  level:
    com.ecru: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
